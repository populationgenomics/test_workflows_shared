version: 2

updates:
  # pip ecosystem for pyproject.toml + requirements*.txt
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Don't update hail - pinned at CPG's installed version
      - dependency-name: "hail"
      # Don't update Python version
      - dependency-name: "python"
    cooldown:
      default-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
