name: SBOM Upload

on:
  push:
    branches: [main]

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  #v8.0.0

      - name: Generate SBOM
        run: |
          uvx cyclonedx-py requirements \
            --input-file requirements.txt \
            --output-format json \
            --output-file sbom.cdx.json

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  #v3.0.0
        with:
          workload_identity_provider: 'projects/379228030003/locations/global/workloadIdentityPools/github/providers/github-actions'
          service_account: 'dtrack-ci@devops-tools-433123.iam.gserviceaccount.com'

      - name: Get IAP identity token
        id: iap-token
        run: |
          TOKEN=$(gcloud auth print-identity-token --audiences=$(gcloud auth list --filter=status:ACTIVE --format='value(account)'))
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload SBOM to Dependency-Track
        run: |
          curl -sf -X PUT "https://dtrack.popgen.rocks/api/v1/bom" \
            -H "Authorization: Bearer ${{ steps.iap-token.outputs.token }}" \
            -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"projectName\": \"${{ github.event.repository.name }}\",
              \"projectVersion\": \"${{ github.sha }}\",
              \"autoCreate\": true,
              \"bom\": \"$(base64 -w0 sbom.cdx.json)\"
            }"
