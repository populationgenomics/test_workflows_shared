name: SBOM Upload

on:
  push:
    branches: [main]

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  #v8.1.0

      - name: Get project version
        id: version
        run: echo "value=$(uv version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: |
          uv venv
          uv pip install -r requirements.txt
          uvx --from cyclonedx-bom cyclonedx-py environment \
              --pyproject pyproject.toml \
              --mc-type application \
              -o sbom.cdx.json \
              .venv/bin/python

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  #v3.0.0
        with:
          workload_identity_provider: 'projects/379228030003/locations/global/workloadIdentityPools/github/providers/github-actions'
          service_account: 'dtrack-ci@devops-tools-433123.iam.gserviceaccount.com'
          token_format: 'id_token'
          id_token_audience: '379228030003-nug7attglk5fht4gmp6v8s2b88epnmsq.apps.googleusercontent.com'
          id_token_include_email: true

      - name: Upload SBOM to Dependency-Track
        env:
          TOKEN: ${{ steps.auth.outputs.id_token }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          PROJECT_VERSION: ${{ steps.version.outputs.value }}
        run: |
            jq -n \
              --arg name "$PROJECT_NAME" \
              --arg version "$PROJECT_VERSION" \
              --rawfile bom sbom.cdx.json \
              --arg ref "$GITHUB_REF_NAME" \
              '{
                projectName: $name,
                projectVersion: $version,
                autoCreate: true,
                bom: ($bom | @base64),
                projectTags: [
                  {name: "python"},
                  {name: $ref}
                ]
              }' | \
            curl -sf -X PUT "https://dtrack.popgen.rocks/api/v1/bom" \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d @-
